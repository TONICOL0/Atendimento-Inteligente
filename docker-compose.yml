networks:
  proj-chat-network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  evolution_instances:
  chatwoot_storage:

services:
  # ============================================
  # PostgreSQL - Database compartilhado
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: proj-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - proj-chat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache e filas
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: proj-chat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - proj-chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO - S3 Storage (TypeBot media)
  # ============================================
  minio:
    image: minio/minio
    container_name: proj-chat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - proj-chat-network

  # Cria bucket do TypeBot automaticamente
  createbuckets:
    image: minio/mc
    container_name: proj-chat-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing minio/typebot;
      /usr/bin/mc anonymous set public minio/typebot/public;
      exit 0;
      "
    networks:
      - proj-chat-network

  # ============================================
  # Evolution API - Conexão WhatsApp
  # ============================================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: proj-chat-evolution
    restart: unless-stopped
    env_file:
      - ./evolution/.env
    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-chat-network

  # ============================================
  # Chatwoot - Plataforma de Atendimento
  # ============================================
  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    container_name: proj-chat-chatwoot
    restart: unless-stopped
    command: sh -c "rm -f /app/tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0"
    env_file:
      - ./chatwoot/.env
    volumes:
      - chatwoot_storage:/app/storage
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-chat-network

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: proj-chat-chatwoot-sidekiq
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file:
      - ./chatwoot/.env
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-chat-network

  # ============================================
  # TypeBot - Builder (criação de bots)
  # ============================================
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: proj-chat-typebot-builder
    restart: unless-stopped
    env_file:
      - ./typebot/.env
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - proj-chat-network

  # ============================================
  # TypeBot - Viewer (execução dos bots)
  # ============================================
  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: proj-chat-typebot-viewer
    restart: unless-stopped
    env_file:
      - ./typebot/.env
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - proj-chat-network

  # ============================================
  # Follow-up Worker - Mensagens automáticas
  # ============================================
  followup-worker:
    build:
      context: ./followup
      dockerfile: Dockerfile
    container_name: proj-chat-followup
    restart: unless-stopped
    environment:
      CHATWOOT_API_URL: http://chatwoot-rails:3000
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN:-changeme}
      CHATWOOT_ACCOUNT_ID: "1"
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: proj-chat-principal
      FOLLOWUP_INTERVAL_MS: "1800000"
      FOLLOWUP_DAY1_HOURS: "24"
      FOLLOWUP_DAY3_HOURS: "72"
      FOLLOWUP_DAY7_HOURS: "168"
    depends_on:
      - chatwoot-rails
      - evolution-api
    networks:
      - proj-chat-network
